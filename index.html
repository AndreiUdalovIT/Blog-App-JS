<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog App</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="reset.css">
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <h1>Blog App</h1>
    <div class="wrapper__flex">
        <div class="left__column">
            <h2>Новый пост</h2>
            <div class="input__flex">   
                <input class="js__title__input title__input" type="text" placeholder="Заголовок">
                <textarea class="js__text__input text__input" placeholder="Напиши пост"></textarea>
                <button class="js__send__btn send__btn">Опубликовать</button>
            </div> 
        </div>
        <div class="right__column">
            <h2>Лента</h2>
            <div class="js-post post">
                <p class="post__text__none">Тут пока пусто...</p>
            </div>
        </div>
    </div>
    <script src="index.js"></script>
</body>
</html>
